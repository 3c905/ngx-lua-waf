# ============================================================
# ngx-lua-waf 增强版 Nginx 配置示例
# ============================================================
# 使用前请根据实际环境调整路径和参数

user  daemon daemon;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /u/medsci/logs/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    use epoll;
    worker_connections  65535;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /u/medsci/logs/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ============================================================
    # 【关键】WAF 共享内存字典配置
    # ============================================================
    # limit:        原版 CC 计数（向后兼容）
    # waf_cc:       增强 CC 计数（全局/静态/动态分级）
    # waf_ban:      封禁 IP 列表
    # waf_cache:    规则文件版本缓存（可选）
    #
    # 大小建议：
    # - waf_cc:  100m 可支持约 200万 IP 计数（QPS 10万+ 场景建议更大）
    # - waf_ban: 50m  可支持约 50万 被封禁 IP
    # - limit:   50m  原版兼容
    # ============================================================
    lua_shared_dict limit      50m;
    lua_shared_dict waf_cc     100m;
    lua_shared_dict waf_ban    50m;
    lua_shared_dict waf_cache  10m;

    # Lua 包路径（根据实际安装路径调整）
    lua_package_path  "/u/nginx/ngx_lua_waf/?.lua;/u/nginx/ngx_lua_waf/lib/?.lua;;";

    # Lua 代码缓存（生产环境必须开启）
    lua_code_cache on;

    # 连接池（如使用 Redis 扩展）
    # lua_socket_connect_timeout 100ms;
    # lua_socket_send_timeout 100ms;
    # lua_socket_read_timeout 100ms;
    # lua_socket_pool_size 30;

    server {
        listen       80;
        server_name  example.com;
        root         /var/www/html;
        index        index.html index.php;

        # ============================================================
        # 【推荐】静态资源由 Nginx 直接处理，减少 Lua 开销
        # ============================================================
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            # 静态资源也可接入 WAF（用于 CC 防护）
            access_by_lua_file /u/nginx/ngx_lua_waf/waf.lua;
            try_files $uri =404;
        }

        # ============================================================
        # 主 Location：WAF + 反向代理
        # ============================================================
        location / {
            # WAF Access 阶段检测
            access_by_lua_file /u/nginx/ngx_lua_waf/waf.lua;
            
            # WAF Response 阶段过滤（敏感信息泄露检测）
            body_filter_by_lua_file /u/nginx/ngx_lua_waf/response.lua;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================================
        # 【可选】WAF 管理接口（仅允许内网访问）
        # ============================================================
        location /waf-admin {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            content_by_lua_block {
                local action = ngx.var.arg_action
                if action == "reload" then
                    local ok = waf_reload_rules()
                    if ok then
                        ngx.say('{"status":"ok","message":"rules reloaded"}')
                    else
                        ngx.say('{"status":"error","message":"reload failed"}')
                    end
                elseif action == "stats" then
                    local cc = require "cc_enhanced"
                    local stats = cc.get_stats(ngx.var.arg_ip)
                    if stats then
                        ngx.say('{"status":"ok","data":' .. require("cjson").encode(stats) .. '}')
                    else
                        ngx.say('{"status":"error","message":"no stats available"}')
                    end
                else
                    ngx.say('{"status":"ok","actions":["reload","stats"]}')
                end
                ngx.header.content_type = "application/json"
            }
        }
    }
}

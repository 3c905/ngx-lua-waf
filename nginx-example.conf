# ============================================================
# ngx-lua-waf 增强版 Nginx 配置示例（生产环境适用）
# ============================================================
# 【重要】使用前请根据实际环境调整路径和参数
# 【重要】此文件为示例，复制到 /u/nginx/conf/nginx.conf 或 conf.d/ 下使用
#
# 已知陷阱（已在本配置中规避）：
# 1. 不要把 response.lua 放到 header_filter_by_lua_file（会导致 empty response）
# 2. 不要 include block-dangerous.conf（会绕过 Lua WAF 日志）
# 3. 不需要 lua_need_request_body on（waf.lua 中已按需调用 ngx.req.read_body）
# 4. lua_package_path 必须包含 lib/ 目录
# ============================================================

user  daemon daemon;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /u/medsci/logs/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    use epoll;
    worker_connections  65535;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" ';

    access_log  /u/medsci/logs/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ============================================================
    # 【关键】WAF 共享内存字典配置
    # ============================================================
    # limit:   原版 CC 计数器 + waf-cli 频率控制
    # waf_cc:  增强版 CC 计数器（全局/静态/动态分级策略）
    # waf_ban: 封禁 IP 列表（渐进式惩罚用）
    #
    # 注意：不需要 waf_cache，代码中未使用
    # ============================================================
    lua_shared_dict limit   50m;
    lua_shared_dict waf_cc  100m;
    lua_shared_dict waf_ban 50m;

    # ============================================================
    # 【关键】Lua 包路径（必须包含 lib/ 目录）
    # ============================================================
    lua_package_path  "/u/nginx/ngx_lua_waf/?.lua;/u/nginx/ngx_lua_waf/lib/?.lua;/usr/local/lib/lua/?.lua;";

    # Lua 代码缓存（生产环境必须开启）
    lua_code_cache on;

    # ============================================================
    # 【关键】WAF 初始化（每个 worker 启动时执行一次）
    # 加载 config.lua、规则文件、全局函数
    # ============================================================
    init_by_lua_file /u/nginx/ngx_lua_waf/init.lua;

    # ============================================================
    # 【警告】不要 include block-dangerous.conf
    # block-dangerous.conf 是独立 Nginx 配置，会直接 return 404，
    # 不经过 Lua WAF 的日志记录和动作模式控制
    # ============================================================
    # include /u/nginx/ngx_lua_waf/block-dangerous.conf;  # ❌ 不要这样做

    # 后端 upstream 示例（根据实际后端修改）
    upstream backend {
        server 127.0.0.1:8080;
        # server 127.0.0.1:8081 backup;
    }

    server {
        listen       80;
        server_name  example.com;
        root         /var/www/html;
        index        index.html index.php;

        # ============================================================
        # WAF Access 阶段检测（拦截恶意请求）
        # 放在 server 块级别，所有 location 都会继承
        # ============================================================
        access_by_lua_file /u/nginx/ngx_lua_waf/waf.lua;

        # ============================================================
        # 【警告】不要把 response.lua 放到 header_filter_by_lua_file
        # response.lua 使用 ngx.arg[1] 读取响应体 chunk，只在 body_filter 阶段有效
        # 放到 header_filter 会导致 ERR_EMPTY_RESPONSE
        # ============================================================
        # header_filter_by_lua_file /u/nginx/ngx_lua_waf/response.lua;  # ❌ 错误

        # ============================================================
        # 静态资源：Nginx 直接处理，减少后端压力
        # access_by_lua_file 已由 server 块继承，静态资源也会经过 WAF
        # （WAF 的 CC 防护、UA 黑名单等对静态资源同样生效）
        # ============================================================
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ============================================================
        # 主 Location：反向代理到后端
        # ============================================================
        location / {
            # WAF 响应体过滤（检测敏感信息泄露）
            # 仅对需要过滤响应体的 location 开启
            body_filter_by_lua_file /u/nginx/ngx_lua_waf/response.lua;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

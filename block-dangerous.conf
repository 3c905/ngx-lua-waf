############################################
# Nginx Security Rules
# block-dangerous.conf
############################################
############################################
# 隐藏文件
############################################

location ~ /.(?!well-known).* {
return 404;
}

############################################
# Git / SVN / IDE
############################################

location ~* ^/(.git|.svn|.hg|.idea|.vscode)(/.*)?$ {
return 404;
}

############################################
# Spring Boot Actuator
############################################

location = /actuator {
return 404;
}

location ^~ /actuator/ {
return 404;
}

############################################
# Spring Boot Sensitive Endpoints
############################################

location ~* ^/actuator/(env|beans|heapdump|threaddump|metrics|prometheus|mappings|configprops|loggers|conditions|caches|scheduledtasks)$ {
return 404;
}

############################################
# Swagger / OpenAPI
############################################

location = /swagger.json {
return 404;
}

location ^~ /swagger-ui/ {
return 404;
}

location ^~ /swagger-resources/ {
return 404;
}

location ^~ /v2/api-docs {
return 404;
}

location ^~ /v3/api-docs {
return 404;
}

location = /openapi.json {
return 404;
}

location = /redoc {
return 404;
}

############################################
# Internal Feature APIs
############################################

location = /system-features {
return 404;
}

############################################
# Health Check
############################################

location = /health {
return 404;
}

location = /healthz {
return 404;
}

location = /livez {
return 404;
}

location = /readyz {
return 404;
}

location = /startupz {
return 404;
}

location = /status {
return 404;
}

############################################
# Metrics / Monitoring
############################################

location = /metrics {
return 404;
}

location = /prometheus {
return 404;
}

location ^~ /metrics/ {
return 404;
}

############################################
# Go pprof
############################################

location ^~ /debug/pprof/ {
return 404;
}

############################################
# Python Debug
############################################

location ^~ /**debug**/ {
return 404;
}

############################################
# Laravel Debugbar
############################################
location ^~ /_debugbar/ {
return 404;
}

############################################
# Symfony Profiler
############################################
location ^~ /_profiler/ {
return 404;
}

############################################
# PHP Info
############################################

location = /phpinfo.php {
return 404;
}

location = /info.php {
return 404;
}

############################################
# Nginx Status
############################################

location = /nginx_status {
return 404;
}

location = /server-status {
return 404;
}

############################################
# Common Debug Paths
############################################

location ~* ^/(debug|test|tests|dev|staging|sandbox)(/.*)?$ {
return 404;
}

############################################
# robots.txt 之外的 txt 文件
############################################

location ~* /(?!robots).*.txt$ {
return 404;
}

############################################
# 危险配置文件
############################################

location ~* .(env|ini|conf|config|properties|yml|yaml)$ {
return 404;
}

############################################
# Java 文件
############################################

location ~* .(java|class|jar|war)$ {
return 404;
}

# ============================================================
# 敏感文件、配置、密钥、CI/CD、备份文件统一拦截
# ============================================================
location ~* "(^|/)(id_(rsa|dsa|ecdsa|ed25519)|authorized_keys|known_hosts)$
|(^|/)(credentials|secrets?|service-account|firebase|google-services|aws-exports)\.(json|ya?ml|toml|ini|conf|cnf|properties|xml|txt)$
|(^|/)(application|bootstrap|settings|config|local|production|prod|staging|stage|development|dev|test|database|db)\.(json|ya?ml|toml|ini|conf|cnf|properties|xml)$
|\.(pem|key|p12|pfx|jks|keystore|truststore|kdb|csr|der)$
|(^|/)(composer\.(json|lock)|package(-lock)?\.json|npm-shrinkwrap\.json|yarn\.lock|pnpm-lock\.ya?ml|bun\.lockb?|bower\.json|Gemfile(\.lock)?|go\.(mod|sum|work)|Cargo\.(toml|lock)|pom\.xml|build\.gradle(\.kts)?|settings\.gradle(\.kts)?|gradle\.properties|mvnw|gradlew|Makefile|CMakeLists\.txt|requirements(-[A-Za-z0-9_.-]+)?\.txt|Pipfile(\.lock)?|pyproject\.toml|poetry\.lock|setup\.(py|cfg)|tox\.ini|pytest\.ini|phpunit\.xml(\.dist)?|artisan|manage\.py|wsgi\.py|asgi\.py|celery\.py)$
|(^|/)(Dockerfile(\.[^/]+)?|Containerfile(\.[^/]+)?|\.dockerignore|docker-compose(\.[^/]+)?\.ya?ml|compose(\.[^/]+)?\.ya?ml|Jenkinsfile|Vagrantfile|Procfile|supervisord\.conf|ecosystem\.config\.(js|cjs|mjs|json)|pm2(\.config)?\.(js|json|ya?ml))$
|\.(tf|tfvars|tfstate|tfstate\.backup)$
|(^|/)(Chart\.ya?ml|values(-[A-Za-z0-9_.-]+)?\.ya?ml|kustomization\.ya?ml|helmfile\.ya?ml|ansible\.cfg|inventory(\.ini)?|playbook\.ya?ml)$
|(^|/).*(~|\.bak|\.backup|\.old|\.orig|\.save|\.swp|\.swo|\.tmp|\.temp|\.copy|\.disabled|\.dist|\.sample|\.example)$
|(^|/)(backup|backups|bak|dump|dumps|old)([._-]?[0-9]{4}[0-9._-]*)?(/|$)
|\.(7z|zip|rar|tar|tgz|tbz2|txz|gz|bz2|xz|lz|lzma|zst|br)$
|\.(sql|sqlite|sqlite3|db|db3|mdb|accdb|dump|dmp|hprof|heapdump|log|trace|out|err)$
|(^|/)(core|core\.[0-9]+)$" {

    return 404;
}

############################################
# Python 文件
############################################

location ~* .(py|pyc|pyo)$ {
return 404;
}

############################################
# Shell 脚本
############################################

location ~* .(sh|bash|zsh|ksh|csh)$ {
return 404;
}

############################################
# SourceMap
############################################

location ~* .map$ {
return 404;
}

############################################
# 日志文件
############################################

location ~* .(log|out)$ {
return 404;
}

############################################
# 数据库文件
############################################

location ~* .(db|sqlite|sqlite3)$ {
return 404;
}

############################################
# 压缩包 / 备份文件
############################################

location ~* .(sql|bak|backup|old|save|tmp|temp|orig|dist)$ {
return 404;
}

location ~* .(zip|tar|tgz|gz|bz2|7z|rar|iso|arj|ace)$ {
return 404;
}

############################################
# PHP Composer
############################################

location ~* /(composer.(json|lock)|vendor/) {
return 404;
}

############################################
# Node.js
############################################

location ~* /(package.json|package-lock.json|yarn.lock|pnpm-lock.yaml)$ {
return 404;
}

location ~* /(node_modules)/ {
return 404;
}

############################################
# 常见敏感目录
############################################

location ~* ^/(backup|backups|test|tests|debug|tmp|temp|logs)/ {
return 404;
}

############################################
# 上传目录禁止执行脚本
############################################
location ~* ^/upload/.*\.(php\d*|jsp|jspx|asp|aspx|cgi|py|sh|pl|rb)$ {
    return 403;
}

# --- 路径穿越 / 空字节拦截 ---
if ($request_uri ~* "(\.\./|%2e%2e|%252e|\%00)") {
    return 400;
}

# --- 补充屏蔽路径 ---
location ~* /(shell|cmd|webshell|c99|r57)\. { return 404; }
location ~* \.(php\d+|php\.bak|php~)$       { return 404; }
location = /.env.local                       { return 404; }
location = /.env.production                  { return 404; }
location ~* ^/wp-(login|config|admin)        { return 404; }

############################################
# AI / Notebook / LLM Debug
############################################
location ~* ^/(gradio|streamlit|jupyter|notebook)(/.*)?$ {
return 404;
}

############################################
# 阻止扫描器 UA
############################################

if ($http_user_agent ~* "(sqlmap|nikto|acunetix|nmap|masscan|dirbuster|wpscan)") {
return 403;
}

############################################
# 阻止恶意 Referer
############################################

if ($http_referer ~* "(semalt|darodar|buttons-for-website)") {
return 403;
}

############################################
# 禁止 TRACE TRACK
############################################

if ($request_method ~* "(TRACE|TRACK)") {
return 403;
}

############################################
# Security Headers
############################################
#add_header X-Frame-Options SAMEORIGIN always;
#add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy strict-origin-when-cross-origin always;

############################################
# Hide Nginx Version
############################################

server_tokens off;
